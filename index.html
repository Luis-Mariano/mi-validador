<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Validador SAP</title>

<!-- 🔥 Librería estable -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" defer></script>

<style>
    * { box-sizing: border-box; }

    body {
        margin: 0;
        font-family: sans-serif;
        background: #f0f2f5;
    }

    .card {
        width: 100%;
        max-width: 420px;
        margin: auto;
        padding: 20px;
        text-align: center;
    }

    h2 { margin-bottom: 5px; }

    #reader {
        width: 100%;
        height: 280px;
        background: black;
        border-radius: 12px;
        margin: 15px 0;
        overflow: hidden;
    }

    button {
        width: 100%;
        padding: 16px;
        margin: 8px 0;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: bold;
    }

    .btn-scan { background: #6f42c1; color: white; }
    .btn-stop { background: #dc3545; color: white; }
    .btn-search { background: #0056b3; color: white; }

    input {
        width: 100%;
        padding: 14px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 16px;
    }

    #resultado {
        margin-top: 15px;
        padding: 15px;
        border-radius: 10px;
        display: none;
        font-weight: bold;
    }

    .error { background: #f8d7da; color: #721c24; }
    .exito { background: #d4edda; color: #155724; }
</style>
</head>

<body>

<div class="card">
    <h2>Validador SAP</h2>
    <p>Escanea o ingresa el código</p>

    <div id="reader"></div>

    <button id="btnAccion" class="btn-scan">📸 Escanear Código</button>

    <input type="text" id="codigoInput" placeholder="Ingresa SAP o Barcode">

    <button class="btn-search" id="btnBuscar">🔍 Buscar Problema</button>

    <div id="resultado"></div>
</div>

<script>
const BASE_DATOS = [
    { sap: "5003014", problema: "Pendiente Alza" },
    { sap: "12616773", problema: "Despriorización por negocio" }
];

let html5QrCode = null;
let scanning = false;

// 🔥 Esperar a que cargue TODO
window.addEventListener("load", () => {

    document.getElementById("btnAccion").addEventListener("click", controlarEscaneo);
    document.getElementById("btnBuscar").addEventListener("click", buscarManual);

});

async function controlarEscaneo() {

    if (typeof Html5Qrcode === "undefined") {
        alert("Error cargando cámara. Recarga la página.");
        return;
    }

    const btn = document.getElementById("btnAccion");

    if (!scanning) {
        html5QrCode = new Html5Qrcode("reader");

        try {
            const devices = await Html5Qrcode.getCameras();

            if (!devices.length) {
                alert("No hay cámaras disponibles");
                return;
            }

            // 🔥 Motorola fix → usar última cámara
            const cameraId = devices[devices.length - 1].id;

            await html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: 250,
                    aspectRatio: 1.777
                },
                (text) => {
                    document.getElementById("codigoInput").value = text;
                    buscarCodigo(text);
                    detenerEscaneo();
                }
            );

            scanning = true;
            btn.textContent = "❌ Detener Cámara";
            btn.classList.remove("btn-scan");
            btn.classList.add("btn-stop");

        } catch (err) {
            console.error(err);
            alert("No se pudo iniciar la cámara");
        }

    } else {
        detenerEscaneo();
    }
}

async function detenerEscaneo() {
    if (html5QrCode && scanning) {
        await html5QrCode.stop();
        scanning = false;

        const btn = document.getElementById("btnAccion");
        btn.textContent = "📸 Escanear Código";
        btn.classList.remove("btn-stop");
        btn.classList.add("btn-scan");
    }
}

function buscarCodigo(valor) {
    const resDiv = document.getElementById("resultado");
    const encontrado = BASE_DATOS.find(p => p.sap === valor);

    resDiv.style.display = "block";

    if (encontrado) {
        resDiv.className = "exito";
        resDiv.innerHTML = `⚠️ PROBLEMA: ${encontrado.problema}`;
    } else {
        resDiv.className = "error";
        resDiv.innerHTML = "✅ Sin problemas registrados.";
    }
}

function buscarManual() {
    const val = document.getElementById("codigoInput").value.trim();
    if (val) buscarCodigo(val);
}

// 🔥 Evita bug de pantalla gris en Android
document.addEventListener("visibilitychange", () => {
    if (document.hidden && scanning) {
        detenerEscaneo();
    }
});
</script>

</body>
</html>
