    document.getElementById("btnAccion").addEventListener("click", controlarEscaneo);
    document.getElementById("btnBuscar").addEventListener("click", buscarManual);

});

async function controlarEscaneo() {

    if (typeof Html5Qrcode === "undefined") {
        alert("Error cargando cámara. Recarga la página.");
        return;
    }

    const btn = document.getElementById("btnAccion");

    if (!scanning) {
        html5QrCode = new Html5Qrcode("reader");

        try {
            const devices = await Html5Qrcode.getCameras();

            if (!devices.length) {
                alert("No hay cámaras disponibles");
                return;
            }

            // 🔥 Motorola fix → usar última cámara
            const cameraId = devices[devices.length - 1].id;

            await html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: 250,
                    aspectRatio: 1.777
                },
                (text) => {
                    document.getElementById("codigoInput").value = text;
                    buscarCodigo(text);
                    detenerEscaneo();
                }
            );

            scanning = true;
            btn.textContent = "❌ Detener Cámara";
            btn.classList.remove("btn-scan");
            btn.classList.add("btn-stop");

        } catch (err) {
            console.error(err);
            alert("No se pudo iniciar la cámara");
        }

    } else {
        detenerEscaneo();
    }
}

async function detenerEscaneo() {
    if (html5QrCode && scanning) {
        await html5QrCode.stop();
        scanning = false;

        const btn = document.getElementById("btnAccion");
        btn.textContent = "📸 Escanear Código";
        btn.classList.remove("btn-stop");
        btn.classList.add("btn-scan");
    }
}

function buscarCodigo(valor) {
    const resDiv = document.getElementById("resultado");
    const encontrado = BASE_DATOS.find(p => p.Codigo === valor);

    resDiv.style.display = "block";

    if (encontrado) {
        resDiv.className = "exito";
        resDiv.innerHTML = `⚠️ PROBLEMA: ${encontrado.problema}`;
        resDiv.innerHTML += `<br><br>📋 DESCRIPCIÓN: ${encontrado.descripcion}`;
    } else {
        resDiv.className = "error";
        resDiv.innerHTML = "✅ Sin problemas registrados.";
    }
}

function buscarManual() {
    const val = document.getElementById("codigoInput").value.trim();
    if (val) buscarCodigo(val);
}

// 🔥 Evita bug de pantalla gris en Android
document.addEventListener("visibilitychange", () => {
    if (document.hidden && scanning) {
        detenerEscaneo();
    }
});
</script>
