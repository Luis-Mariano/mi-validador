<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador SAP</title>
    <!-- Cargamos la librería desde un servidor confiable -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        /* IMPORTANTE: El contenedor de la cámara debe tener un tamaño mínimo */
        #reader { width: 100%; min-height: 250px; background: #eee; border-radius: 8px; margin-bottom: 10px; border: 2px solid #ddd; display: none; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-scan { background-color: #6f42c1; color: white; }
        .btn-search { background-color: #0056b3; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #resultado { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
        .error { background-color: #f8d7da; color: #721c24; }
        .exito { background-color: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="card">
    <h2>Validador de SAP</h2>
    <p>Escanea o ingresa el código</p>

    <!-- AQUÍ SE VERÁ LA CÁMARA -->
    <div id="reader"></div>
    
    <button class="btn-scan" id="btnAccion" onclick="controlarEscaneo()">📸 Escanear Código</button>
    
    <input type="text" id="codigoInput" placeholder="Ingresa SAP o Barcode">
    <button class="btn-search" onclick="buscarManual()">🔍 Buscar Problema</button>

    <div id="resultado"></div>
</div>

<script>
    // --- DATOS CARGADOS DESDE TU IMAGEN ---
    const BASE_DATOS = [
        { sap: "5003014", barcode: "", problema: "Pendiente Alza" },
        { sap: "5026741", barcode: "", problema: "Pendiente Alza" },
        { sap: "5011412", barcode: "", problema: "Pendiente Alza" },
        { sap: "5074669", barcode: "", problema: "Pendiente Alza" },
        { sap: "252090", barcode: "", problema: "Pendiente Alza" },
        { sap: "12616773", barcode: "", problema: "Despriorización por decisión de negocio" },
        { sap: "12618107", barcode: "", problema: "Coberturas ajustadas por mal performance" },
        { sap: "12527348", barcode: "", problema: "Priorización mix de línea 100x100" },
        { sap: "12321814", barcode: "", problema: "Impacto factores externos (lluvia)" },
        { sap: "12618111", barcode: "", problema: "Altas coberturas por menor venta" },
        { sap: "799192732645", barcode: "", problema: "Cierre Marzo 172%, principalmente por stock" },
        { sap: "12558241", barcode: "", problema: "Impacto plan de producción W14 y W15" },
        { sap: "12573113", barcode: "", problema: "Impacto por incumplimiento planes de entrega" },
        { sap: "12619203", barcode: "", problema: "Baja cobertura W19 por retraso en el arribo" },
        { sap: "12617778", barcode: "", problema: "Saturación de línea Mespack" },
        { sap: "12580795", barcode: "", problema: "Solicitud de nuevos análisis por parte de calidad" },
        { sap: "12540300", barcode: "", problema: "Abastecimiento de grasa gallina con retraso" },
        { sap: "12628834", barcode: "", problema: "Baja cobertura debido por agote de stock" },
        { sap: "12225814", barcode: "", problema: "Aumento de compra WM por adelanto de compra" },
        { sap: "12436511", barcode: "", problema: "Riesgo de baja cobertura y quiebre de stock" },
        { sap: "12141545", barcode: "", problema: "Aumento de compra WM por adelanto" },
        { sap: "12482910", barcode: "", problema: "Quiebre por priorización de mix (foco stock)" },
        { sap: "12493299", barcode: "", problema: "Baja cobertura por alta saturación de líneas" },
        { sap: "12621013", barcode: "", problema: "Baja cobertura por priorización de mix" },
        { sap: "12605484", barcode: "", problema: "Alza de demanda (+30%) por mejor performance" },
        { sap: "13301674", barcode: "", problema: "Bloqueo preventivo por desvío de calidad" },
        { sap: "12521971", barcode: "", problema: "Bloqueo de MP debido a issue de calidad" },
        { sap: "12513664", barcode: "", problema: "Atraso producción +4 sem por falta de insumos" }
    ];
 let html5QrCode;

    async function controlarEscaneo() {
        const readerDiv = document.getElementById('reader');
        const btn = document.getElementById('btnAccion');

        if (!html5QrCode || !html5QrCode.isScanning) {
            readerDiv.style.display = "block"; // Mostramos el cuadro
            html5QrCode = new Html5Qrcode("reader");
            
            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 10, qrbox: { width: 250, height: 150 } },
                    (text) => {
                        document.getElementById('codigoInput').value = text;
                        buscarCodigo(text);
                        detenerEscaneo();
                    }
                );
                btn.innerText = "❌ Detener Cámara";
                btn.style.backgroundColor = "#dc3545";
            } catch (err) {
                alert("Error: No se pudo abrir la cámara. Verifica que la URL sea HTTPS.");
                readerDiv.style.display = "none";
            }
        } else {
            detenerEscaneo();
        }
    }

    async function detenerEscaneo() {
        if (html5QrCode) {
            await html5QrCode.stop();
            document.getElementById('reader').style.display = "none";
            const btn = document.getElementById('btnAccion');
            btn.innerText = "📸 Escanear Código";
            btn.style.backgroundColor = "#6f42c1";
        }
    }

    function buscarCodigo(valor) {
        const resDiv = document.getElementById('resultado');
        const encontrado = BASE_DATOS.find(p => p.sap === valor);
        resDiv.style.display = "block";
        if (encontrado) {
            resDiv.className = "exito";
            resDiv.innerHTML = `⚠️ PROBLEMA: ${encontrado.problema}`;
        } else {
            resDiv.className = "error";
            resDiv.innerHTML = "✅ Sin problemas registrados.";
        }
    }

    function buscarManual() {
        const val = document.getElementById('codigoInput').value.trim();
        if (val) buscarCodigo(val);
    }
</script>

</body>
</html>
